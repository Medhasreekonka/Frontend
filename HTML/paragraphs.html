<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!--Case1-->
    <p>Hello</p>
    <p>Hi</p>
    <!--Case2-->
    <p>Hello</p><p>HI</p>
    <!--Case3-->
    <p>Hello Hi!</p>
    <!--Case4-->
    <!--br break tag displays in new line-->
    <p>Hello <br>
        HI!!
    </p>
    <!--Preformatted text/ tag-->
    <pre>Hello <br>
                            H    I!!
    </pre>
</body>
</html>
