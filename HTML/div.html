<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div tag</title>
</head>
<body>
    <!--Block Level Element div, pre, p , heading tags-->
    <div>Hello</div>
    <div>Hi</div>
    <pre>Hey</pre>
    <p>Hiii</p>
    <!--Inline elemenrs-- span, a, img, u, sub, sup-->
    <span>Hello EVeryone</span>
    <span>Hi</span>

    <p>Students are very <span style="color: brown;">Knowledgable</span></p>
</body>
</html>
