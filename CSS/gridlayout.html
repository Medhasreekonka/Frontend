<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 5px;
            background-color: gray;
            padding: 5px;
        }

        .container div{
            background-color: #f1f1f1;
            text-align: center;
            padding: 10px;
            font-size: 30px;
        }

        .item1 {
            /*grid-column-start: 1;
            grid-column-end: 4;*/
            grid-column: 1 / 4;
        }
        .item2 {
            grid-row-start: 2;
            grid-row-end: 4;
            /*grid-row: 2 / 4*/
        }
    </style>
</head>
<body>
    <h1>The grid column property</h1>

    <div class="container">
        <div class="item1">Header</div>
        <div class="item2">Sidebar</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>
    </div>
</body>
</html>
