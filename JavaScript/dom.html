<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <h1>DOM Methods</h1>
    <p>getElementsbytagname</p>
    <p id="paraid" class="bluetext">getElementsbyId</p>
    <p class="bluetext">getElementsbyclassname</p>
    <p>getElementsbyname</p>
    <h4>Hello</h4>
    <h4>Thank You</h4>
    <input type="text" placeholder="Enter your fav hero" name="favhero">
    <p id = "pvalue">Value displayed here</p>
    <button onclick="change()"> Click me to change</button>

    <script>
        document.querySelector("h1").innerHTML = "<h3><i>DOM Methods in JS</i></h3>";
        //document.querySelector("h1").innerText = "DOM Methods in JS";
        document.querySelector("button").textContent = "Click button!";
        let p = document.querySelectorAll("h4");
        p.forEach((p) => {
            p.style.backgroundColor = "black";
            p.style.color = "white";
        });
        document.getElementsByTagName("P")[0].style.color ="green";
        document.getElementById("paraid").style.fontSize = "50px";

        let bt = document.getElementsByClassName("bluetext");
        for(let i=0; i<=bt.length; i++) {
                bt[i].style.color = "blue";
                bt[i].style.backgroundColor = "pink";
        }

        function change() {
            let x = document.getElementsByName("favhero")[0].value;
            document.getElementById("pvalue").innerText = x;
            let paras = document.getElementsByTagName("p");
            for(let i=0; i<=paras.length; i++) {
                paras[i].style.color = "red";
                paras[i].style.backgroundColor = "yellow";
        }
        }
        

    </script>
</body>
</html>
