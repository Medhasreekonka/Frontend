<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popups</title>
</head>
<body>
    <h4>Popups in JS</h4>
    <hr>
    <script>
        //alert
        alert("form is submitted sucessfully");
        alert("Warning only 500mb left")
        //confirm
        let choice = confirm("DO you want to continue?");
        document.writeln("The user selected : ", choice)
        document.write("<br>")
        document.writeln("The user selected : ", (choice ? "ok" : "cancel"));
        //prompt
        let name = prompt("Enter your name")
        alert("The user entered " + name)
        //write a simple prompt to add 2 nos from user
        let n1 = Number(prompt("Enter first number"))
        let n2 = Number(prompt("Enter second number"))
        let result = n1 + n2
        document.writeln(result)
    </script>
    </script>
</body>
</html>
